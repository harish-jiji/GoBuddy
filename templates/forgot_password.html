{% extends 'customers/base.html' %} {# Using customer base for glassmorphism styling #}

{% block content %}
<div class="max-w-xl mx-auto py-20">
    <div class="customer-glass p-10 rounded-4xl border border-white/10 shadow-3xl text-center space-y-8">
        <div class="w-20 h-20 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto text-blue-400 text-3xl">
            <i class="fas fa-user-lock"></i>
        </div>

        <h1 class="text-4xl font-bold text-white">Forgot Password?</h1>
        <p class="text-gray-400 text-lg">Enter your email and we'll confirm your security identity.</p>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div class="relative group">
                <i class="fas fa-envelope absolute left-5 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-blue-500 transition"></i>
                <input type="email" name="email" required placeholder="your.email@example.com"
                       class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-6 py-4 focus:outline-none focus:border-blue-500 transition text-white shadow-xl">
            </div>

            <button type="submit" class="w-full customer-gradient-bg py-4 rounded-2xl font-bold shadow-2xl hover:scale-105 transition transform text-lg">
                Continue to Security Challenge
            </button>
            
            <p class="text-sm text-gray-500">
                Wait, I remember! <a href="{% url 'core:signin' %}" class="text-blue-400 hover:underline">Back to sign in</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
