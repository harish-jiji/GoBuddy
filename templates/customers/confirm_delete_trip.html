{% extends 'customers/base.html' %}

{% block content %}
<div class="max-w-xl mx-auto mt-20">
    <div class="glass p-8 border border-red-500/30 rounded-2xl text-center space-y-6">
        <div
            class="w-16 h-16 bg-red-500/20 rounded-full flex items-center justify-center mx-auto text-red-500 text-2xl">
            <i class="fas fa-exclamation-triangle"></i>
        </div>

        <h1 class="text-3xl font-bold text-white">Delete Trip?</h1>

        <p class="text-gray-300 text-lg">
            Are you sure you want to delete the trip <strong>"{{ trip.title }}"</strong>?
            <br>
            <span class="text-sm text-gray-500">This action cannot be undone.</span>
        </p>

        <form method="POST" class="flex flex-col gap-4">
            {% csrf_token %}

            <button type="submit"
                class="w-full py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl transition transform hover:scale-105">
                Yes, Delete Trip
            </button>

            <a href="{% url 'customers:trip_detail' trip.id %}"
                class="w-full py-3 bg-white/10 hover:bg-white/20 text-white font-semibold rounded-xl transition">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
