{% extends 'customers/base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto py-8">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-3xl font-bold text-white">General Settings</h1>
            <p class="text-gray-400">Manage your basic account identity</p>
        </div>
        <div class="flex space-x-2">
            <a href="{% url 'customers:profile' %}" class="px-4 py-2 bg-white/20 rounded-lg text-sm transition font-bold">General</a>
            <a href="{% url 'customers:security_settings' %}" class="px-4 py-2 bg-white/5 hover:bg-white/10 rounded-lg text-sm transition">Security</a>
            <a href="{% url 'customers:privacy_settings' %}" class="px-4 py-2 bg-white/5 hover:bg-white/10 rounded-lg text-sm transition">Privacy</a>
            <a href="{% url 'customers:notification_settings' %}" class="px-4 py-2 bg-white/5 hover:bg-white/10 rounded-lg text-sm transition">Notifications</a>
        </div>
    </div>

    <form method="POST" enctype="multipart/form-data" class="space-y-8">
        {% csrf_token %}

        <div class="customer-glass p-8 rounded-3xl border border-white/10">
            <div class="flex flex-col md:flex-row gap-8">
                <!-- Avatar -->
                <div class="flex flex-col items-center space-y-4">
                    <div class="relative group">
                        <img id="avatar-preview"
                             src="{% if profile.profile_image %}{{ profile.profile_image.url }}{% else %}/static/default.jpg{% endif %}"
                             class="w-32 h-32 rounded-full object-cover border-4 border-white/10 group-hover:border-blue-500/50 transition">
                        <label class="absolute bottom-0 right-0 w-10 h-10 customer-gradient-bg rounded-full flex items-center justify-center cursor-pointer shadow-lg hover:scale-110 transition">
                            <i class="fas fa-camera text-white"></i>
                            <input type="file" name="profile_image" class="hidden" accept="image/*" onchange="previewImage(this)">
                        </label>
                    </div>
                </div>

                <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-gray-300">Full Name</label>
                        <input type="text" name="full_name" value="{{ user.full_name }}" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition text-white">
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-medium text-gray-300">Username (@)</label>
                        <input type="text" name="username" value="{{ user.username|default:'' }}" 
                               id="username-input"
                               pattern="^[a-z ]{4,25}$"
                               title="4-25 characters, lowercase and spaces only"
                               placeholder="choose a username"
                               class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none border-blue-500/50 transition text-blue-400 font-mono">
                        <p class="text-[10px] text-gray-500">Lowercase and spaces only. Min 4, Max 25.</p>
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-medium text-gray-300">Email Address</label>
                        <input type="email" name="email" value="{{ user.email }}" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition text-white">
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-medium text-gray-300">Phone</label>
                        <input type="text" name="phone" value="{{ profile.phone|default:'' }}" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition text-white">
                    </div>

                    <div class="space-y-2 col-span-full">
                        <label class="text-sm font-medium text-gray-300">Bio</label>
                        <textarea name="bio" rows="3" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition text-white">{{ profile.bio|default:'' }}</textarea>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex justify-end pt-4">
            <button type="submit" class="customer-gradient-bg px-8 py-4 rounded-2xl font-bold shadow-xl hover:scale-105 transition">
                Update Profile
            </button>
        </div>
    </form>
</div>

<script>
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) { document.getElementById('avatar-preview').src = e.target.result; }
            reader.readAsDataURL(input.files[0]);
        }
    }

    const usernameInput = document.getElementById('username-input');
    if (usernameInput) {
        usernameInput.addEventListener('input', function(e) {
            this.value = this.value.toLowerCase();
        });
    }
</script>
{% endblock %}
