{% extends 'customers/base.html' %}

{% block content %}
<div class="max-w-xl mx-auto py-20">
    <div class="customer-glass p-12 rounded-4xl border border-white/10 shadow-3xl text-center space-y-8">
        <div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto text-green-400 text-3xl">
            <i class="fas fa-lock-open"></i>
        </div>

        <h1 class="text-4xl font-bold text-white">Reset Password</h1>
        <p class="text-gray-400 text-lg">Identity verified! Please set a strong new password.</p>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div class="space-y-4">
                <div class="relative group">
                    <i class="fas fa-key absolute left-5 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-blue-500 transition"></i>
                    <input type="password" name="password" required placeholder="New password"
                           class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-6 py-4 focus:outline-none focus:border-blue-500 transition text-white shadow-xl">
                </div>
                
                <div class="relative group">
                    <i class="fas fa-check-circle absolute left-5 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-blue-500 transition"></i>
                    <input type="password" name="confirm_password" required placeholder="Confirm new password"
                           class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-6 py-4 focus:outline-none focus:border-blue-500 transition text-white shadow-xl">
                </div>
            </div>

            <button type="submit" class="w-full customer-gradient-bg py-4 rounded-2xl font-bold shadow-2xl hover:scale-105 transition transform text-lg">
                Save New Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
