<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - GoBuddy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />

    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        .admin-gradient-bg {
            background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 100%);
        }

        .admin-glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .admin-card-hover {
            transition: .3s;
        }

        .admin-card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, .4);
        }

        .admin-fade-in {
            animation: fadeIn .8s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .admin-ripple {
            position: relative;
            overflow: hidden;
        }

        .admin-ripple::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: .6s;
        }

        .admin-ripple:active::before {
            width: 300px;
            height: 300px;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 text-white min-h-screen">

    <!-- NAVBAR -->
    <header class="admin-glass-effect border-b border-white/20 sticky top-0 z-50">
        <div class="flex justify-between items-center px-6 py-4">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 admin-gradient-bg rounded-xl flex items-center justify-center">
                    <i class="fas fa-shield-alt text-white text-lg"></i>
                </div>
                <div>
                    <h1
                        class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
                        GoBuddy</h1>
                    <p class="text-xs text-gray-400">Admin Portal</p>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="flex flex-col lg:flex-row items-center justify-center min-h-[90vh] px-6 py-8">

        <!-- LOGIN -->
        <section class="w-full max-w-md admin-fade-in">
            <div class="admin-glass-effect rounded-3xl p-10">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 admin-gradient-bg rounded-full mx-auto flex items-center justify-center mb-4">
                        <i class="fas fa-user-shield text-2xl"></i>
                    </div>
                    <h2 class="text-3xl font-bold">Admin Access</h2>
                    <p class="text-gray-300 text-sm">Staff authentication required</p>
                </div>

                {% if messages %}
                {% for message in messages %}
                <div
                    class="mb-4 p-4 rounded-lg text-sm {% if message.tags == 'error' %}bg-red-500/20 text-red-200 border border-red-500/30{% else %}bg-blue-500/20 text-blue-200 border border-blue-500/30{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
                {% endif %}

                <!-- Django Login Form -->
                <form method="POST" action="{% url 'adminpanel:manager_login' %}">
                    {% csrf_token %}
                    <!-- Hidden Next Field -->
                    <input type="hidden" name="next" value="{{ request.GET.next }}">

                    <!-- EMAIL -->
                    <div class="mb-6">
                        <label class="block text-sm mb-2 text-gray-300">Admin Email</label>
                        <div class="relative">
                            <input type="email" name="username" required
                                class="w-full px-4 py-3 pl-12 rounded-xl admin-glass-effect text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500"
                                placeholder="admin@gobuddy.com">

                            <i class="fas fa-envelope absolute left-4 top-4 text-gray-400"></i>
                        </div>
                    </div>

                    <!-- PASSWORD -->
                    <div class="mb-6">
                        <label class="block text-sm mb-2 text-gray-300">Password</label>
                        <div class="relative">
                            <input type="password" name="password" id="adminPassword" required
                                class="w-full px-4 py-3 pl-12 pr-12 rounded-xl admin-glass-effect text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500"
                                placeholder="Enter password">

                            <i class="fas fa-lock absolute left-4 top-4 text-gray-400"></i>
                            <button type="button" id="togglePassword"
                                class="absolute right-4 top-4 text-gray-400 hover:text-white">
                                <i class="far fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- MANDATORY 2FA -->
                    <div class="mb-6">
                        <label class="block text-sm mb-2 text-gray-300">2FA Code (Global Access Code)</label>
                        <div class="relative">
                            <input type="text" name="two_factor_code" id="two_factor_code" required
                                class="w-full px-4 py-3 pl-12 rounded-xl admin-glass-effect text-white placeholder-gray-400 focus:ring-2 focus:ring-purple-500"
                                placeholder="6-digit code" maxlength="6">

                            <i class="fas fa-key absolute left-4 top-4 text-gray-400"></i>
                        </div>
                    </div>

                    <!-- SUBMIT -->
                    <button type="submit"
                        class="w-full admin-gradient-bg rounded-xl py-3 font-semibold hover:opacity-90 transition-all admin-ripple mt-6">
                        <i class="fas fa-sign-in-alt mr-2"></i> Access Admin Panel
                    </button>
                </form>

            </div>
        </section>
    </main>

    <!-- TOGGLE PASSWORD -->
    <script>
        document.getElementById("togglePassword").addEventListener("click", function () {
            const pwd = document.getElementById("adminPassword");
            const icon = this.querySelector("i");

            if (pwd.type === "password") {
                pwd.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                pwd.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        });
    </script>

</body>

</html>
