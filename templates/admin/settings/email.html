{% extends 'admin/base_admin.html' %}
{% block title %}Email Settings{% endblock %}
{% block header_title %}Email Configurations{% endblock %}

{% block content %}
<div class="max-w-2xl bg-white rounded-xl shadow-sm border border-gray-100 p-8">
  <h3 class="text-lg font-bold text-gray-900 mb-6">Email Preferences</h3>
  <p class="text-gray-500 mb-6 font-mono text-sm">Template: settings/email.html</p>

  <div class="space-y-4">
    <div class="flex items-center justify-between p-4 border border-gray-200 rounded-lg">
      <div>
        <p class="font-medium text-gray-900">System Notifications</p>
        <p class="text-sm text-gray-500">Receive emails about system updates</p>
      </div>
      <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
        <input type="checkbox" name="toggle" id="toggle1"
          class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer"
          checked />
        <label for="toggle1"
          class="toggle-label block overflow-hidden h-6 rounded-full bg-blue-300 cursor-pointer"></label>
      </div>
    </div>
  </div>
</div>
{% endblock %}
