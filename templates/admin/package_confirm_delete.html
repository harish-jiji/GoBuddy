{% extends 'admin/base_admin.html' %}

{% block title %}Delete Package{% endblock %}
{% block header_title %}Delete Package{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-8">
    <div class="text-center mb-6">
        <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                </path>
            </svg>
        </div>
        <h3 class="text-lg font-medium text-gray-900 mb-2">Are you sure?</h3>
        <p class="text-gray-500">
            You are about to delete the package <span class="font-semibold text-gray-900">{{ object.name }}</span>.
            This action cannot be undone.
        </p>
    </div>

    <form method="post" class="flex justify-center space-x-4">
        {% csrf_token %}
        <a href="{% url 'adminpanel:packages' %}"
            class="px-6 py-2.5 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors">
            Cancel
        </a>
        <button type="submit"
            class="px-6 py-2.5 bg-red-600 text-white rounded-lg shadow-sm hover:bg-red-700 transition-colors">
            Delete Package
        </button>
    </form>
</div>
{% endblock %}
